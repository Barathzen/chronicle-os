version: "3.9"

services:

	# Postgres with pgvector preinstalled
	db:
		image: ankane/pgvector:postgres-16
		container_name: chronicle_postgres
		environment:
			POSTGRES_USER: postgres
			POSTGRES_PASSWORD: postgres
			POSTGRES_DB: chronicle_os
		ports:
			- "5432:5432"
		volumes:
			- postgres_data:/var/lib/postgresql/data

	redis:
		image: redis:7
		container_name: chronicle_redis
		ports:
			- "6379:6379"
		volumes:
			- redis_data:/data

	backend:
		build:
			context: ./backend
			dockerfile: Dockerfile
		container_name: chronicle_backend
		depends_on:
			- db
			- redis
		environment:
			DATABASE_URL: postgresql://postgres:postgres@db:5432/chronicle_os
			REDIS_URL: redis://redis:6379/0
			ENV: development
		ports:
			- "8000:8000"
		volumes:
			- ./backend:/app

volumes:
	postgres_data:
	redis_data:
